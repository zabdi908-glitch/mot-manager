<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOT Manager Pro – Full CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
    <style>
        /* ---------- RESET & BASE ---------- */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #CE2026; --primary-dark: #a6191e; --primary-light: #fceaea;
            --secondary: #2071CE; --bg: #f4f6f9; --surface: #ffffff;
            --text-primary: #1a1a2e; --text-secondary: #4a4a5a; --text-muted: #8a8a9a;
            --border: #e2e6ee; --shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            --radius: 14px; --radius-sm: 8px; --transition: 0.25s ease;
            --font: 'Inter', system-ui, -apple-system, sans-serif;
        }
        html { font-size: 16px; scroll-behavior: smooth; }
        body { font-family: var(--font); background: var(--bg); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; }
        a { text-decoration: none; color: inherit; }
        button { cursor: pointer; font-family: var(--font); border: none; outline: none; background: none; font-size: 0.9rem; }
        input, select, textarea {
            font-family: var(--font); font-size: 0.95rem; border: 1.5px solid var(--border);
            border-radius: var(--radius-sm); padding: 0.7rem 1rem; background: var(--surface);
            color: var(--text-primary); transition: border var(--transition); width: 100%; outline: none;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(206, 32, 38, 0.12); }
        textarea { resize: vertical; min-height: 80px; }

        /* ---------- LAYOUT ---------- */
        .app-wrapper { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1.5rem 3rem; width: 100%; flex: 1; }

        /* ---------- HEADER ---------- */
        .app-header {
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 1rem; padding: 1rem 0 1.5rem;
            border-bottom: 2px solid var(--border); margin-bottom: 2rem;
        }
        .logo-area { display: flex; align-items: center; gap: 0.75rem; }
        .logo-icon { width: 44px; height: 44px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 1.3rem; }
        .logo-text { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
        .logo-text span { color: var(--primary); }
        .header-actions { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
        .notif-badge {
            position: relative; padding: 0.5rem 0.9rem; background: var(--surface);
            border-radius: 40px; box-shadow: var(--shadow); display: flex; align-items: center;
            gap: 0.4rem; font-size: 0.85rem; font-weight: 500; transition: background var(--transition);
        }
        .notif-badge:hover { background: var(--primary-light); }
        .notif-badge .count { background: var(--primary); color: #fff; border-radius: 40px; padding: 0.1rem 0.55rem; font-size: 0.75rem; font-weight: 600; }

        /* ---------- NAV TABS ---------- */
        .nav-tabs {
            display: flex; gap: 0.25rem; background: var(--surface); border-radius: var(--radius);
            padding: 0.3rem; box-shadow: var(--shadow); margin-bottom: 2rem; flex-wrap: wrap;
        }
        .nav-tab { padding: 0.7rem 1.6rem; border-radius: var(--radius-sm); font-weight: 500; color: var(--text-secondary); transition: all var(--transition); flex: 0 1 auto; text-align: center; }
        .nav-tab:hover { background: var(--primary-light); color: var(--primary); }
        .nav-tab.active { background: var(--primary); color: #fff; box-shadow: 0 4px 12px rgba(206, 32, 38, 0.25); }

        /* ---------- PANELS ---------- */
        .panel { display: none; animation: fadeUp 0.35s ease; }
        .panel.active { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* ---------- STATS CARDS ---------- */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1.2rem; margin-bottom: 2rem; }
        .stat-card { background: var(--surface); padding: 1.4rem 1.2rem; border-radius: var(--radius); box-shadow: var(--shadow); border-left: 4px solid var(--primary); }
        .stat-card:nth-child(2) { border-left-color: var(--secondary); }
        .stat-card:nth-child(3) { border-left-color: #2ecc71; }
        .stat-card:nth-child(4) { border-left-color: #f39c12; }
        .stat-card .label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); font-weight: 600; }
        .stat-card .value { font-size: 2rem; font-weight: 700; margin-top: 0.25rem; }

        /* ---------- CUSTOMER & VEHICLE LISTS ---------- */
        .list-grid { display: grid; gap: 1rem; }
        .list-item-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.2rem 1.5rem; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 1rem; transition: transform var(--transition), box-shadow var(--transition); }
        .list-item-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08); }
        .item-info { flex: 1; min-width: 200px; }
        .item-info .title { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.5px; }
        .item-info .sub { color: var(--text-secondary); font-size: 0.95rem; }
        .item-status { display: flex; align-items: center; gap: 1.2rem; flex-wrap: wrap; }
        .status-badge { padding: 0.3rem 0.9rem; border-radius: 40px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
        .status-badge.valid { background: #d4edda; color: #155724; }
        .status-badge.due-soon { background: #fff3cd; color: #856404; }
        .status-badge.overdue { background: #f8d7da; color: #721c24; }
        .status-badge.pending { background: #cce5ff; color: #004085; }
        .mot-date { font-size: 0.85rem; color: var(--text-secondary); display: flex; align-items: center; gap: 0.3rem; }
        .mot-date strong { color: var(--text-primary); }
        .item-actions { display: flex; gap: 0.4rem; }
        .item-actions button { padding: 0.3rem 0.8rem; border-radius: var(--radius-sm); font-size: 0.8rem; font-weight: 500; transition: all var(--transition); }
        .btn-edit { background: var(--secondary); color: #fff; }
        .btn-edit:hover { opacity: 0.85; }
        .btn-delete { background: #e74c3c; color: #fff; }
        .btn-delete:hover { opacity: 0.85; }
        .btn-book { background: var(--primary); color: #fff; }
        .btn-book:hover { background: var(--primary-dark); }

        /* ---------- FORMS ---------- */
        .form-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.8rem 2rem; max-width: 600px; margin-bottom: 2rem; }
        .form-card h3 { margin-bottom: 1.2rem; font-size: 1.2rem; font-weight: 600; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-row .full-width { grid-column: 1 / -1; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-weight: 500; font-size: 0.85rem; margin-bottom: 0.3rem; color: var(--text-secondary); }
        .btn-primary { background: var(--primary); color: #fff; padding: 0.7rem 2rem; border-radius: var(--radius-sm); font-weight: 600; transition: background var(--transition); width: 100%; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); padding: 0.6rem 1.6rem; border-radius: var(--radius-sm); font-weight: 600; transition: all var(--transition); }
        .btn-outline:hover { background: var(--primary); color: #fff; }

        /* ---------- BOOKING SECTION ---------- */
        .booking-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        @media (max-width: 800px) { .booking-grid { grid-template-columns: 1fr; } }
        .booking-list .booking-item { background: var(--surface); border-radius: var(--radius-sm); padding: 0.8rem 1.2rem; margin-bottom: 0.6rem; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
        .booking-item .b-reg { font-weight: 600; }
        .booking-item .b-date { color: var(--text-secondary); font-size: 0.85rem; }
        .booking-item .b-status { font-size: 0.75rem; font-weight: 600; padding: 0.2rem 0.7rem; border-radius: 40px; }
        .b-status.confirmed { background: #d4edda; color: #155724; }
        .b-status.pending { background: #fff3cd; color: #856404; }
        .b-status.completed { background: #cce5ff; color: #004085; }

        /* ---------- NOTIFICATIONS ---------- */
        .notif-list { max-height: 400px; overflow-y: auto; }
        .notif-item { background: var(--surface); border-radius: var(--radius-sm); padding: 0.8rem 1.2rem; margin-bottom: 0.5rem; border-left: 4px solid var(--primary); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
        .notif-item .notif-text { font-size: 0.9rem; }
        .notif-item .notif-time { font-size: 0.75rem; color: var(--text-muted); }
        .notif-item.dismissed { opacity: 0.5; border-left-color: var(--text-muted); }

        /* ---------- TOAST ---------- */
        .toast-container { position: fixed; bottom: 2rem; right: 2rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.6rem; max-width: 380px; width: 100%; }
        .toast { background: var(--surface); padding: 0.9rem 1.4rem; border-radius: var(--radius-sm); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12); border-left: 4px solid var(--primary); animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 0.8rem; font-size: 0.9rem; }
        .toast.success { border-left-color: #2ecc71; }
        .toast.warning { border-left-color: #f39c12; }
        .toast.error { border-left-color: #e74c3c; }
        .toast .toast-close { margin-left: auto; cursor: pointer; font-size: 1.2rem; opacity: 0.5; transition: opacity var(--transition); background: none; border: none; padding: 0 0.2rem; }
        .toast .toast-close:hover { opacity: 1; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

        /* ---------- EMPTY STATE ---------- */
        .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
        .empty-state .icon { font-size: 3.5rem; margin-bottom: 0.5rem; }
        .empty-state h4 { font-size: 1.2rem; color: var(--text-secondary); margin-bottom: 0.3rem; }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 640px) {
            .app-wrapper { padding: 1rem; }
            .app-header { flex-direction: column; align-items: stretch; }
            .logo-area { justify-content: center; }
            .header-actions { justify-content: center; }
            .nav-tabs { justify-content: center; }
            .nav-tab { flex: 1; padding: 0.5rem 0.8rem; font-size: 0.8rem; }
            .form-row { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .list-item-card { flex-direction: column; align-items: stretch; text-align: center; }
            .item-status { justify-content: center; }
            .item-actions { justify-content: center; }
            .form-card { padding: 1.2rem; }
            .toast-container { right: 1rem; left: 1rem; max-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="app-wrapper" id="app">
        <!-- HEADER -->
        <header class="app-header">
            <div class="logo-area">
                <div class="logo-icon">M</div>
                <div class="logo-text">MOT<span>Manager</span></div>
            </div>
            <div class="header-actions">
                <button class="notif-badge" id="notifBell" title="View notifications">
                    🔔 <span id="notifCount" class="count">0</span>
                </button>
                <button class="btn-outline" id="addVehicleBtn" style="padding:0.4rem 1.2rem;">+ Add Vehicle</button>
            </div>
        </header>

        <!-- NAV TABS -->
        <nav class="nav-tabs" id="navTabs">
            <button class="nav-tab active" data-panel="dashboard">📊 Dashboard</button>
            <button class="nav-tab" data-panel="vehicles">🚗 Vehicles</button>
            <button class="nav-tab" data-panel="bookings">📅 Bookings</button>
            <button class="nav-tab" data-panel="notifications">🔔 Notifications</button>
            <button class="nav-tab" data-panel="customers">👤 Customers</button>
        </nav>

        <!-- ========== PANEL: DASHBOARD ========== -->
        <section class="panel active" id="panel-dashboard">
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card"><div class="label">Total Vehicles</div><div class="value" id="statTotal">0</div></div>
                <div class="stat-card"><div class="label">MOT Due Soon</div><div class="value" id="statDueSoon">0</div></div>
                <div class="stat-card"><div class="label">Overdue</div><div class="value" id="statOverdue">0</div></div>
                <div class="stat-card"><div class="label">Upcoming Bookings</div><div class="value" id="statBookings">0</div></div>
            </div>
            <h3 style="margin-bottom:1rem;">⚠️ MOT Alerts</h3>
            <div id="alertList" class="list-grid"></div>
        </section>

        <!-- ========== PANEL: VEHICLES ========== -->
        <section class="panel" id="panel-vehicles">
            <div class="form-card" id="vehicleFormCard" style="display:none;">
                <h3 id="formTitle">Add Vehicle</h3>
                <form id="vehicleForm" autocomplete="off">
                    <input type="hidden" id="editId" value="" />
                    <div class="form-row">
                        <div class="form-group">
                            <label for="regNumber">Registration</label>
                            <input type="text" id="regNumber" placeholder="e.g. AB12 CDE" required />
                        </div>
                        <div class="form-group full-width">
                            <label for="vehicleCustomer">Customer</label>
                            <select id="vehicleCustomer" required>
                                <option value="">— Select a customer —</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="make">Make</label>
                            <input type="text" id="make" placeholder="e.g. Ford" required />
                        </div>
                        <div class="form-group">
                            <label for="model">Model</label>
                            <input type="text" id="model" placeholder="e.g. Focus" required />
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="year">Year</label>
                            <input type="number" id="year" placeholder="e.g. 2018" min="1900" max="2100" />
                        </div>
                        <div class="form-group">
                            <label for="motExpiry">MOT Expiry Date</label>
                            <input type="date" id="motExpiry" required />
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="mileage">Mileage (optional)</label>
                            <input type="number" id="mileage" placeholder="e.g. 45000" min="0" />
                        </div>
                        <div class="form-group">
                            <label for="notes">Notes (optional)</label>
                            <textarea id="notes" placeholder="Any extra info..."></textarea>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary" id="formSubmitBtn">Save Vehicle</button>
                    <button type="button" class="btn-outline" id="formCancelBtn" style="margin-top:0.5rem;width:100%;">Cancel</button>
                </form>
            </div>

            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;margin-bottom:1rem;">
                <h3>Your Vehicles</h3>
                <button class="btn-primary" id="showAddFormBtn" style="width:auto;padding:0.5rem 1.5rem;">+ Add Vehicle</button>
            </div>
            <div id="vehicleList" class="list-grid"></div>
        </section>

        <!-- ========== PANEL: BOOKINGS ========== -->
        <section class="panel" id="panel-bookings">
            <div class="booking-grid">
                <div>
                    <div class="form-card" style="max-width:100%;">
                        <h3>📌 Book an MOT Test</h3>
                        <form id="bookingForm">
                            <div class="form-group">
                                <label for="bookingVehicle">Select Vehicle</label>
                                <select id="bookingVehicle" required>
                                    <option value="">— Choose a vehicle —</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="bookingDate">Preferred Date</label>
                                <input type="date" id="bookingDate" required />
                            </div>
                            <div class="form-group">
                                <label for="bookingTime">Preferred Time</label>
                                <input type="time" id="bookingTime" value="09:00" />
                            </div>
                            <div class="form-group">
                                <label for="bookingNotes">Notes (optional)</label>
                                <textarea id="bookingNotes" placeholder="Any special requests..."></textarea>
                            </div>
                            <button type="submit" class="btn-primary">Request Booking</button>
                        </form>
                    </div>
                </div>
                <div>
                    <h3 style="margin-bottom:1rem;">📋 Your Bookings</h3>
                    <div id="bookingList" class="booking-list"></div>
                </div>
            </div>
        </section>

        <!-- ========== PANEL: NOTIFICATIONS ========== -->
        <section class="panel" id="panel-notifications">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;margin-bottom:1rem;">
                <h3>🔔 Notification History</h3>
                <button class="btn-outline" id="dismissAllNotifs" style="padding:0.3rem 1rem;font-size:0.8rem;">Dismiss All</button>
            </div>
            <div id="notifList" class="notif-list"></div>
        </section>

        <!-- ========== PANEL: CUSTOMERS ========== -->
        <section class="panel" id="panel-customers">
            <!-- Customer Form -->
            <div class="form-card" id="customerFormCard" style="display:none;">
                <h3 id="customerFormTitle">Add Customer</h3>
                <form id="customerForm" autocomplete="off">
                    <input type="hidden" id="editCustomerId" value="" />
                    <div class="form-row">
                        <div class="form-group">
                            <label for="custName">Full Name</label>
                            <input type="text" id="custName" placeholder="e.g. John Smith" required />
                        </div>
                        <div class="form-group">
                            <label for="custPhone">Phone</label>
                            <input type="text" id="custPhone" placeholder="e.g. 07123 456789" />
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="custEmail">Email</label>
                            <input type="email" id="custEmail" placeholder="john@example.com" />
                        </div>
                        <div class="form-group">
                            <label for="custAddress">Address</label>
                            <input type="text" id="custAddress" placeholder="123 High Street..." />
                        </div>
                    </div>
                    <button type="submit" class="btn-primary" id="custFormSubmitBtn">Save Customer</button>
                    <button type="button" class="btn-outline" id="custFormCancelBtn" style="margin-top:0.5rem;width:100%;">Cancel</button>
                </form>
            </div>

            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;margin-bottom:1rem;">
                <h3>Your Customers</h3>
                <button class="btn-primary" id="showAddCustomerFormBtn" style="width:auto;padding:0.5rem 1.5rem;">+ Add Customer</button>
            </div>
            <div id="customerList" class="list-grid"></div>
        </section>
    </div>

    <!-- TOAST CONTAINER -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ============================================================ -->
    <!--  FRONTEND JAVASCRIPT – FULL CRM INTEGRATION                   -->
    <!-- ============================================================ -->
    <script>
        (function() {
            'use strict';

            const API_BASE = '/api';
            let data = { customers: [], vehicles: [], bookings: [], notifications: [] };

            // ---------- HELPERS ----------
            function formatDate(dateStr) {
                if (!dateStr) return '—';
                const d = new Date(dateStr + 'T00:00:00');
                return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
            }

            function daysUntil(dateStr) {
                const now = new Date(); now.setHours(0, 0, 0, 0);
                const target = new Date(dateStr + 'T00:00:00');
                return Math.ceil((target - now) / (1000 * 60 * 60 * 24));
            }

            function getStatus(expiry) {
                if (!expiry) return 'pending';
                const days = daysUntil(expiry);
                if (days < 0) return 'overdue';
                if (days <= 30) return 'due-soon';
                return 'valid';
            }

            function getStatusLabel(status) {
                const map = { 'valid': '✅ Valid', 'due-soon': '⚠️ Due Soon', 'overdue': '🔴 Overdue', 'pending': '⏳ Pending' };
                return map[status] || status;
            }

            function getStatusBadgeClass(status) {
                const map = { 'valid': 'valid', 'due-soon': 'due-soon', 'overdue': 'overdue', 'pending': 'pending' };
                return map[status] || '';
            }

            function getVehicle(id) { return data.vehicles.find(v => v.id === id); }
            function getCustomer(id) { return data.customers.find(c => c.id === id); }

            function getVehiclesWithStatus() {
                return data.vehicles.map(v => ({
                    ...v,
                    status: getStatus(v.motExpiry),
                    daysUntil: v.motExpiry ? daysUntil(v.motExpiry) : null,
                }));
            }

            // ---------- API CALLS ----------
            async function fetchState() {
                try {
                    const res = await fetch(`${API_BASE}/data`);
                    if (!res.ok) throw new Error('Failed to fetch data');
                    data = await res.json();
                    renderAll();
                } catch (e) { console.error('API error', e); showToast('Failed to load data from server', 'error'); }
            }

            async function apiCall(method, endpoint, body = null) {
                const opts = { method, headers: { 'Content-Type': 'application/json' } };
                if (body) opts.body = JSON.stringify(body);
                const res = await fetch(`${API_BASE}${endpoint}`, opts);
                if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error || 'Request failed'); }
                return res.status === 204 ? null : await res.json();
            }

            // ----- CUSTOMERS -----
            async function addCustomer(customer) {
                await apiCall('POST', '/customers', customer);
                await fetchState();
                showToast('Customer added!', 'success');
            }
            async function updateCustomer(id, updates) {
                await apiCall('PUT', `/customers/${id}`, updates);
                await fetchState();
                showToast('Customer updated!', 'success');
            }
            async function deleteCustomer(id) {
                if (!confirm('Delete this customer? (Their vehicles will be unlinked but kept)')) return;
                await apiCall('DELETE', `/customers/${id}`);
                await fetchState();
                showToast('Customer deleted.', 'info');
            }

            // ----- VEHICLES -----
            async function addVehicle(vehicle) {
                await apiCall('POST', '/vehicles', vehicle);
                await fetchState();
                showToast('Vehicle added!', 'success');
            }
            async function updateVehicle(id, updates) {
                await apiCall('PUT', `/vehicles/${id}`, updates);
                await fetchState();
                showToast('Vehicle updated!', 'success');
            }
            async function deleteVehicle(id) {
                if (!confirm('Delete this vehicle and its bookings?')) return;
                await apiCall('DELETE', `/vehicles/${id}`);
                await fetchState();
                showToast('Vehicle deleted.', 'info');
            }

            // ----- BOOKINGS -----
            async function addBooking(booking) {
                await apiCall('POST', '/bookings', booking);
                await fetchState();
                showToast('Booking requested!', 'success');
            }
            async function updateBookingStatus(id, status) {
                await apiCall('PUT', `/bookings/${id}`, { status });
                await fetchState();
                showToast(`Booking ${status}.`, 'info');
            }
            async function deleteBooking(id) {
                await apiCall('DELETE', `/bookings/${id}`);
                await fetchState();
            }

            // ----- NOTIFICATIONS -----
            async function createNotification(message, type = 'info') {
                await apiCall('POST', '/notifications', { message, type });
                await fetchState();
                if ('Notification' in window && Notification.permission === 'granted') {
                    new Notification('MOT Manager', { body: message, icon: '🚗' });
                }
            }
            async function dismissNotification(id) {
                await apiCall('PUT', `/notifications/${id}`, { dismissed: true });
                await fetchState();
            }
            async function dismissAllNotifications() {
                const active = data.notifications.filter(n => !n.dismissed);
                for (const n of active) {
                    await apiCall('PUT', `/notifications/${n.id}`, { dismissed: true });
                }
                await fetchState();
                showToast('All notifications dismissed.', 'info');
            }

            // ---------- CHECK ALERTS ----------
            function checkVehicleAlerts(vehicle) {
                const days = vehicle.motExpiry ? daysUntil(vehicle.motExpiry) : null;
                if (days === null) return;
                const recent = data.notifications.filter(n =>
                    n.message.includes(vehicle.regNumber) && !n.dismissed &&
                    (Date.now() - new Date(n.createdAt).getTime() < 86400000)
                );
                if (recent.length > 0) return;
                let msg = '';
                if (days < 0) msg = `🚨 MOT overdue for ${vehicle.regNumber} (${formatDate(vehicle.motExpiry)}) – book now!`;
                else if (days <= 7) msg = `⚠️ MOT due in ${days} day${days===1?'':'s'} for ${vehicle.regNumber} – don't forget!`;
                else if (days <= 30) msg = `📅 MOT due in ${days} days for ${vehicle.regNumber} – book your test soon.`;
                if (msg) createNotification(msg, days < 0 ? 'error' : 'warning');
            }
            function checkAllVehiclesAlerts() { data.vehicles.forEach(v => checkVehicleAlerts(v)); }

            // ---------- RENDER ----------
            function renderStats() {
                const vehicles = getVehiclesWithStatus();
                document.getElementById('statTotal').textContent = vehicles.length;
                document.getElementById('statDueSoon').textContent = vehicles.filter(v => v.status === 'due-soon').length;
                document.getElementById('statOverdue').textContent = vehicles.filter(v => v.status === 'overdue').length;
                document.getElementById('statBookings').textContent = data.bookings.filter(b => b.status !== 'cancelled' && b.status !== 'completed').length;
            }

            function renderCustomers() {
                const container = document.getElementById('customerList');
                if (data.customers.length === 0) {
                    container.innerHTML = `<div class="empty-state"><div class="icon">👤</div><h4>No customers yet</h4><p class="text-muted">Add your first customer to link them to vehicles.</p></div>`;
                    return;
                }
                container.innerHTML = data.customers.map(c => `
                    <div class="list-item-card">
                        <div class="item-info">
                            <div class="title">${c.name}</div>
                            <div class="sub">📞 ${c.phone || '—'}  •  ✉️ ${c.email || '—'}</div>
                            <div class="sub" style="font-size:0.8rem;">🏠 ${c.address || 'No address'}</div>
                        </div>
                        <div class="item-actions">
                            <button class="btn-edit" data-action="edit-cust" data-id="${c.id}">Edit</button>
                            <button class="btn-delete" data-action="delete-cust" data-id="${c.id}">Delete</button>
                        </div>
                    </div>
                `).join('');

                container.querySelectorAll('[data-action="edit-cust"]').forEach(btn => {
                    btn.addEventListener('click', () => openEditCustomerForm(btn.dataset.id));
                });
                container.querySelectorAll('[data-action="delete-cust"]').forEach(btn => {
                    btn.addEventListener('click', () => deleteCustomer(btn.dataset.id));
                });
            }

            function renderVehicles() {
                const container = document.getElementById('vehicleList');
                const vehicles = getVehiclesWithStatus();
                if (vehicles.length === 0) {
                    container.innerHTML = `<div class="empty-state"><div class="icon">🚗</div><h4>No vehicles yet</h4><p class="text-muted">Add your first vehicle to start tracking MOTs.</p></div>`;
                    return;
                }
                container.innerHTML = vehicles.map(v => {
                    const cust = getCustomer(v.customerId);
                    return `
                    <div class="list-item-card" data-id="${v.id}">
                        <div class="item-info">
                            <div class="sub" style="font-weight:600; color:var(--primary);">👤 ${cust ? cust.name : 'No Customer'}</div>
                            <div class="title">${v.regNumber}</div>
                            <div class="sub">${v.make} ${v.model} ${v.year ? '· '+v.year : ''}</div>
                            ${v.mileage ? `<div class="text-muted" style="font-size:0.8rem;">${v.mileage.toLocaleString()} mi</div>` : ''}
                        </div>
                        <div class="item-status">
                            <span class="status-badge ${getStatusBadgeClass(v.status)}">${getStatusLabel(v.status)}</span>
                            <span class="mot-date">📅 <strong>${formatDate(v.motExpiry)}</strong> ${v.daysUntil !== null ? `(${v.daysUntil < 0 ? 'overdue' : v.daysUntil+' days'})` : ''}</span>
                            <div class="item-actions">
                                <button class="btn-book" data-action="book" data-id="${v.id}">Book MOT</button>
                                <button class="btn-edit" data-action="edit" data-id="${v.id}">Edit</button>
                                <button class="btn-delete" data-action="delete" data-id="${v.id}">Delete</button>
                            </div>
                        </div>
                    </div>
                `}).join('');

                container.querySelectorAll('[data-action="book"]').forEach(btn => {
                    btn.addEventListener('click', () => { switchTab('bookings'); document.getElementById('bookingVehicle').value = btn.dataset.id; });
                });
                container.querySelectorAll('[data-action="edit"]').forEach(btn => {
                    btn.addEventListener('click', () => openEditVehicleForm(btn.dataset.id));
                });
                container.querySelectorAll('[data-action="delete"]').forEach(btn => {
                    btn.addEventListener('click', () => deleteVehicle(btn.dataset.id));
                });
            }

            function renderAlerts() {
                const container = document.getElementById('alertList');
                const vehicles = getVehiclesWithStatus().filter(v => v.status === 'overdue' || v.status === 'due-soon');
                if (vehicles.length === 0) {
                    container.innerHTML = `<div class="empty-state" style="padding:1.5rem;"><p>✅ No MOT alerts – all vehicles are up to date!</p></div>`;
                    return;
                }
                container.innerHTML = vehicles.map(v => {
                    const cust = getCustomer(v.customerId);
                    return `
                    <div class="list-item-card" style="border-left:4px solid ${v.status === 'overdue' ? '#e74c3c' : '#f39c12'};">
                        <div class="item-info">
                            <div class="sub" style="font-weight:600;color:var(--primary);">👤 ${cust ? cust.name : 'No Customer'}</div>
                            <div class="title">${v.regNumber}</div>
                            <div class="sub">${v.make} ${v.model}</div>
                        </div>
                        <div class="item-status">
                            <span class="status-badge ${getStatusBadgeClass(v.status)}">${getStatusLabel(v.status)}</span>
                            <span class="mot-date">📅 MOT: ${formatDate(v.motExpiry)} ${v.daysUntil !== null ? `(${v.daysUntil < 0 ? 'overdue' : v.daysUntil+' days'})` : ''}</span>
                            <button class="btn-book" data-id="${v.id}" style="padding:0.3rem 1.2rem;">Book Now</button>
                        </div>
                    </div>
                `}).join('');
                container.querySelectorAll('.btn-book').forEach(btn => {
                    btn.addEventListener('click', () => { switchTab('bookings'); document.getElementById('bookingVehicle').value = btn.dataset.id; });
                });
            }

            function renderBookings() {
                const container = document.getElementById('bookingList');
                const bookings = data.bookings.sort((a, b) => new Date(a.date) - new Date(b.date));
                if (bookings.length === 0) {
                    container.innerHTML = `<div class="empty-state" style="padding:1.5rem;"><p>📭 No bookings yet. Use the form to book an MOT.</p></div>`;
                    return;
                }
                container.innerHTML = bookings.map(b => {
                    const vehicle = getVehicle(b.vehicleId);
                    const reg = vehicle ? vehicle.regNumber : 'Unknown vehicle';
                    const statusMap = { pending: '⏳ Pending', confirmed: '✅ Confirmed', completed: '✔️ Completed', cancelled: '❌ Cancelled' };
                    return `
                    <div class="booking-item">
                        <div>
                            <div class="b-reg">${reg}</div>
                            <div class="b-date">📅 ${formatDate(b.date)} at ${b.time.slice(0,5)}</div>
                            ${b.notes ? `<div class="text-muted" style="font-size:0.75rem;">${b.notes}</div>` : ''}
                        </div>
                        <div style="display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap;">
                            <span class="b-status ${b.status}">${statusMap[b.status] || b.status}</span>
                            ${b.status === 'pending' ? `<button class="btn-edit" style="padding:0.15rem 0.6rem;font-size:0.7rem;" data-action="confirm" data-id="${b.id}">Confirm</button>` : ''}
                            ${b.status === 'pending' || b.status === 'confirmed' ? `<button class="btn-delete" style="padding:0.15rem 0.6rem;font-size:0.7rem;" data-action="cancel" data-id="${b.id}">Cancel</button>` : ''}
                        </div>
                    </div>
                `}).join('');

                container.querySelectorAll('[data-action="confirm"]').forEach(btn => {
                    btn.addEventListener('click', () => updateBookingStatus(btn.dataset.id, 'confirmed'));
                });
                container.querySelectorAll('[data-action="cancel"]').forEach(btn => {
                    btn.addEventListener('click', () => { if (confirm('Cancel this booking?')) updateBookingStatus(btn.dataset.id, 'cancelled'); });
                });
            }

            function renderNotifications() {
                const container = document.getElementById('notifList');
                if (data.notifications.length === 0) {
                    container.innerHTML = `<div class="empty-state" style="padding:1.5rem;"><p>🔔 No notifications yet.</p></div>`;
                    return;
                }
                container.innerHTML = data.notifications.map(n => `
                    <div class="notif-item ${n.dismissed ? 'dismissed' : ''}" data-id="${n.id}">
                        <div>
                            <div class="notif-text">${n.message}</div>
                            <div class="notif-time">${new Date(n.createdAt).toLocaleString('en-GB')}</div>
                        </div>
                        ${!n.dismissed ? `<button class="btn-outline" style="padding:0.1rem 0.6rem;font-size:0.7rem;" data-action="dismiss" data-id="${n.id}">Dismiss</button>` : ''}
                    </div>
                `).join('');
                container.querySelectorAll('[data-action="dismiss"]').forEach(btn => {
                    btn.addEventListener('click', () => dismissNotification(btn.dataset.id));
                });
                const active = data.notifications.filter(n => !n.dismissed).length;
                document.getElementById('notifCount').textContent = active;
            }

            function renderDropdowns() {
                const custSelect = document.getElementById('vehicleCustomer');
                const currVal = custSelect.value;
                custSelect.innerHTML = '<option value="">— Select a customer —</option>' +
                    data.customers.map(c => `<option value="${c.id}" ${c.id === currVal ? 'selected' : ''}>${c.name}</option>`).join('');

                const bookSelect = document.getElementById('bookingVehicle');
                const currBookVal = bookSelect.value;
                bookSelect.innerHTML = '<option value="">— Choose a vehicle —</option>' +
                    data.vehicles.map(v => `<option value="${v.id}" ${v.id === currBookVal ? 'selected' : ''}>${v.regNumber} – ${v.make} ${v.model}</option>`).join('');
            }

            function renderAll() {
                renderStats();
                renderCustomers();
                renderVehicles();
                renderAlerts();
                renderBookings();
                renderNotifications();
                renderDropdowns();
                const active = data.notifications.filter(n => !n.dismissed).length;
                document.getElementById('notifCount').textContent = active;
            }

            // ---------- TAB SWITCHING ----------
            function switchTab(panelId) {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                const tab = document.querySelector(`.nav-tab[data-panel="${panelId}"]`);
                if (tab) tab.classList.add('active');
                const panel = document.getElementById(`panel-${panelId}`);
                if (panel) panel.classList.add('active');
                if (panelId !== 'vehicles') document.getElementById('vehicleFormCard').style.display = 'none';
                if (panelId !== 'customers') document.getElementById('customerFormCard').style.display = 'none';
            }

            // ---------- FORM HANDLING (VEHICLES) ----------
            function openEditVehicleForm(id) {
                const v = getVehicle(id);
                if (!v) return;
                document.getElementById('editId').value = v.id;
                document.getElementById('regNumber').value = v.regNumber;
                document.getElementById('vehicleCustomer').value = v.customerId || '';
                document.getElementById('make').value = v.make;
                document.getElementById('model').value = v.model;
                document.getElementById('year').value = v.year || '';
                document.getElementById('motExpiry').value = v.motExpiry || '';
                document.getElementById('mileage').value = v.mileage || '';
                document.getElementById('notes').value = v.notes || '';
                document.getElementById('formTitle').textContent = 'Edit Vehicle';
                document.getElementById('formSubmitBtn').textContent = 'Update Vehicle';
                document.getElementById('vehicleFormCard').style.display = 'block';
                switchTab('vehicles');
                document.getElementById('vehicleFormCard').scrollIntoView({ behavior: 'smooth' });
            }

            function resetVehicleForm() {
                document.getElementById('editId').value = '';
                document.getElementById('regNumber').value = '';
                document.getElementById('vehicleCustomer').value = '';
                document.getElementById('make').value = '';
                document.getElementById('model').value = '';
                document.getElementById('year').value = '';
                document.getElementById('motExpiry').value = '';
                document.getElementById('mileage').value = '';
                document.getElementById('notes').value = '';
                document.getElementById('formTitle').textContent = 'Add Vehicle';
                document.getElementById('formSubmitBtn').textContent = 'Save Vehicle';
                document.getElementById('vehicleFormCard').style.display = 'none';
            }

            // ---------- FORM HANDLING (CUSTOMERS) ----------
            function openEditCustomerForm(id) {
                const c = getCustomer(id);
                if (!c) return;
                document.getElementById('editCustomerId').value = c.id;
                document.getElementById('custName').value = c.name;
                document.getElementById('custPhone').value = c.phone || '';
                document.getElementById('custEmail').value = c.email || '';
                document.getElementById('custAddress').value = c.address || '';
                document.getElementById('customerFormTitle').textContent = 'Edit Customer';
                document.getElementById('custFormSubmitBtn').textContent = 'Update Customer';
                document.getElementById('customerFormCard').style.display = 'block';
                switchTab('customers');
                document.getElementById('customerFormCard').scrollIntoView({ behavior: 'smooth' });
            }

            function resetCustomerForm() {
                document.getElementById('editCustomerId').value = '';
                document.getElementById('custName').value = '';
                document.getElementById('custPhone').value = '';
                document.getElementById('custEmail').value = '';
                document.getElementById('custAddress').value = '';
                document.getElementById('customerFormTitle').textContent = 'Add Customer';
                document.getElementById('custFormSubmitBtn').textContent = 'Save Customer';
                document.getElementById('customerFormCard').style.display = 'none';
            }

            // ---------- TOAST ----------
            function showToast(message, type = 'info') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                const icons = { info: 'ℹ️', success: '✅', warning: '⚠️', error: '🚨' };
                toast.innerHTML = `<span>${icons[type] || 'ℹ️'}</span><span>${message}</span><button class="toast-close">&times;</button>`;
                container.appendChild(toast);
                const closeBtn = toast.querySelector('.toast-close');
                closeBtn.addEventListener('click', () => { toast.remove(); });
                setTimeout(() => { if (toast.parentNode) toast.remove(); }, 5000);
            }

            // ---------- INIT ----------
            async function init() {
                if ('Notification' in window && Notification.permission === 'default') {
                    Notification.requestPermission();
                }

                // Tabs
                document.querySelectorAll('.nav-tab').forEach(tab => {
                    tab.addEventListener('click', () => { switchTab(tab.dataset.panel); });
                });

                // Add Customer form handlers
                document.getElementById('showAddCustomerFormBtn').addEventListener('click', () => {
                    resetCustomerForm();
                    document.getElementById('customerFormCard').style.display = 'block';
                    switchTab('customers');
                    document.getElementById('customerFormCard').scrollIntoView({ behavior: 'smooth' });
                });
                document.getElementById('custFormCancelBtn').addEventListener('click', resetCustomerForm);

                document.getElementById('customerForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const editId = document.getElementById('editCustomerId').value;
                    const payload = {
                        name: document.getElementById('custName').value,
                        phone: document.getElementById('custPhone').value,
                        email: document.getElementById('custEmail').value,
                        address: document.getElementById('custAddress').value
                    };
                    if (editId) await updateCustomer(editId, payload);
                    else await addCustomer(payload);
                    resetCustomerForm();
                });

                // Add Vehicle form handlers
                document.getElementById('addVehicleBtn').addEventListener('click', () => {
                    resetVehicleForm();
                    document.getElementById('vehicleFormCard').style.display = 'block';
                    switchTab('vehicles');
                    document.getElementById('vehicleFormCard').scrollIntoView({ behavior: 'smooth' });
                });
                document.getElementById('showAddFormBtn').addEventListener('click', () => {
                    resetVehicleForm();
                    document.getElementById('vehicleFormCard').style.display = 'block';
                    document.getElementById('vehicleFormCard').scrollIntoView({ behavior: 'smooth' });
                });
                document.getElementById('formCancelBtn').addEventListener('click', resetVehicleForm);

                document.getElementById('vehicleForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const editId = document.getElementById('editId').value;
                    const payload = {
                        regNumber: document.getElementById('regNumber').value,
                        customerId: document.getElementById('vehicleCustomer').value,
                        make: document.getElementById('make').value,
                        model: document.getElementById('model').value,
                        year: document.getElementById('year').value,
                        motExpiry: document.getElementById('motExpiry').value,
                        mileage: document.getElementById('mileage').value,
                        notes: document.getElementById('notes').value,
                    };
                    if (editId) await updateVehicle(editId, payload);
                    else await addVehicle(payload);
                    resetVehicleForm();
                });

                // Booking form
                document.getElementById('bookingForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const vehicleId = document.getElementById('bookingVehicle').value;
                    const date = document.getElementById('bookingDate').value;
                    const time = document.getElementById('bookingTime').value;
                    const notes = document.getElementById('bookingNotes').value;
                    if (!vehicleId) { showToast('Please select a vehicle.', 'warning'); return; }
                    if (!date) { showToast('Please select a date.', 'warning'); return; }
                    await addBooking({ vehicleId, date, time, notes });
                    document.getElementById('bookingNotes').value = '';
                });

                // Notifications
                document.getElementById('notifBell').addEventListener('click', () => { switchTab('notifications'); });
                document.getElementById('dismissAllNotifs').addEventListener('click', async () => {
                    if (data.notifications.some(n => !n.dismissed)) await dismissAllNotifications();
                });

                // Load initial state
                await fetchState();
                checkAllVehiclesAlerts();
                setInterval(() => { fetchState().then(() => checkAllVehiclesAlerts()); }, 6 * 3600000);

                console.log('🚗 MOT Manager (Full CRM) ready!');
                console.log(`👤 ${data.customers.length} customers, 🚗 ${data.vehicles.length} vehicles, 📅 ${data.bookings.length} bookings`);
            }

            init();
        })();
    </script>
</body>
</html>
