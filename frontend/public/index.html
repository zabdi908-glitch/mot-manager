<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Check Your MOT Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --ink: #1c2321; --ink-soft: #333d3a;
            --paper: #f5f1e6; --surface: #fffdf8;
            --plate-yellow: #ffd400; --plate-yellow-dark: #e0ba00;
            --mot-green: #2b5d34; --mot-green-bg: #e2ecdf;
            --hazard-red: #b8262c; --hazard-red-bg: #f6dfdd;
            --amber: #8a5a00; --amber-bg: #f7ecd4;
            --steel-blue: #2f5170;
            --text-secondary: #55605c; --text-muted: #8b8f83;
            --border: #d9d0ba; --shadow: 0 3px 14px rgba(28,35,33,0.08);
            --radius-sm: 4px;
            --font-display: 'Oswald', sans-serif;
            --font-body: 'IBM Plex Sans', sans-serif;
        }
        html { font-size: 16px; }
        body {
            font-family: var(--font-body); color: var(--ink);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background-color: var(--paper);
            background-image: radial-gradient(rgba(28,35,33,0.05) 1px, transparent 1px);
            background-size: 22px 22px;
        }
        .hazard-bar {
            width: 100%; height: 10px;
            background: repeating-linear-gradient(-45deg, var(--ink) 0 14px, var(--plate-yellow) 14px 28px);
        }
        button { cursor: pointer; font-family: var(--font-body); border: none; outline: none; }
        input {
            font-family: var(--font-body); font-size: 1rem; border: 1.5px solid var(--border);
            border-radius: var(--radius-sm); padding: 0.8rem 1rem; background: var(--surface);
            color: var(--ink); width: 100%; outline: none; text-transform: uppercase; letter-spacing: 0.05em;
        }
        input:focus { border-color: var(--ink); box-shadow: 0 0 0 3px rgba(28,35,33,0.08); }

        .header { background: var(--ink); color: var(--paper); width: 100%; padding: 1.4rem 1.5rem; text-align: center; }
        .header .logo-icon {
            width: 46px; height: 46px; border-radius: 50%; border: 2.5px dashed var(--plate-yellow);
            display: flex; align-items: center; justify-content: center; color: var(--plate-yellow);
            font-weight: 700; font-size: 0.8rem; font-family: var(--font-display); letter-spacing: 0.03em;
            transform: rotate(-8deg); margin: 0 auto 0.6rem; text-align: center; line-height: 1.05;
        }
        .header h1 { font-family: var(--font-display); text-transform: uppercase; font-size: 1.4rem; letter-spacing: 0.03em; }
        .header h1 span { color: var(--plate-yellow); }
        .header p { color: #cfc9b8; font-size: 0.85rem; margin-top: 0.2rem; letter-spacing: 0.03em; }
        .header { padding-bottom: 1.7rem; }

        .wrap { max-width: 480px; width: 100%; padding: 2rem 1.3rem 3rem; flex: 1; }

        .card { background: var(--surface); border-radius: var(--radius-sm); box-shadow: var(--shadow); padding: 1.6rem 1.5rem; margin-bottom: 1.2rem; border-top: 3px dashed var(--ink); }
        .card h2 { font-family: var(--font-display); text-transform: uppercase; letter-spacing: 0.03em; font-size: 1rem; margin-bottom: 1rem; }
        .search-row { display: flex; gap: 0.6rem; }
        .search-row input { flex: 1; }
        .btn-primary {
            background: var(--ink); color: var(--plate-yellow); padding: 0.8rem 1.6rem; border-radius: var(--radius-sm);
            font-weight: 600; width: 100%; font-family: var(--font-display); text-transform: uppercase;
            letter-spacing: 0.05em; font-size: 0.9rem; position: relative;
        }
        .btn-primary:hover { background: var(--ink-soft); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-loading { color: transparent !important; }
        .btn-loading::after {
            content: ''; position: absolute; top: 50%; left: 50%; width: 16px; height: 16px;
            margin: -8px 0 0 -8px; border: 2px solid rgba(255,212,0,0.35); border-top-color: var(--plate-yellow);
            border-radius: 50%; animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .plate {
            display: inline-flex; align-items: center; position: relative;
            font-family: var(--font-display); font-weight: 600; letter-spacing: 0.14em;
            background: var(--plate-yellow); color: var(--ink);
            border: 2px solid var(--ink); border-radius: 3px;
            padding: 0.4rem 0.9rem 0.4rem 2.1rem; font-size: 1.3rem; text-transform: uppercase;
            box-shadow: inset 0 0 0 2px var(--plate-yellow-dark);
        }
        .plate::before {
            content: 'GB'; position: absolute; left: 0; top: 0; bottom: 0; width: 1.7rem;
            background: var(--steel-blue); color: #fff; font-size: 0.6rem; font-weight: 700;
            font-family: var(--font-body); letter-spacing: 0; display: flex; align-items: center; justify-content: center;
            border-radius: 1px 0 0 1px;
        }

        .stamp {
            display: inline-block; font-family: var(--font-display); text-transform: uppercase;
            letter-spacing: 0.07em; font-weight: 600; font-size: 0.85rem; padding: 0.4rem 1rem;
            border: 2px solid currentColor; border-radius: var(--radius-sm); transform: rotate(-3deg); margin-top: 1rem;
        }
        .stamp.valid { color: var(--mot-green); background: var(--mot-green-bg); }
        .stamp.due-soon { color: var(--amber); background: var(--amber-bg); border-style: dashed; }
        .stamp.overdue { color: var(--hazard-red); background: var(--hazard-red-bg); transform: rotate(3deg); }

        .result-meta { color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.9rem; line-height: 1.5; }
        .result-meta strong { color: var(--ink); }

        .error-msg { color: var(--hazard-red); font-size: 0.9rem; margin-top: 0.8rem; }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-weight: 600; font-size: 0.78rem; margin-bottom: 0.3rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
        .form-group textarea, .form-group input[type="date"], .form-group input[type="time"] {
            font-family: var(--font-body); font-size: 0.95rem; border: 1.5px solid var(--border);
            border-radius: var(--radius-sm); padding: 0.7rem 1rem; background: var(--surface);
            color: var(--ink); width: 100%; outline: none; text-transform: none; letter-spacing: normal;
        }
        .form-group textarea { resize: vertical; min-height: 70px; }

        .success-box { text-align: center; padding: 1rem 0; }
        .success-box .big-tick { font-family: var(--font-display); font-size: 2.2rem; color: var(--mot-green); }
        .success-box p { color: var(--text-secondary); margin-top: 0.5rem; }

        .footer-note { text-align: center; color: var(--text-muted); font-size: 0.8rem; margin-top: 1.5rem; }
        .hidden { display: none !important; }

        .steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.8rem; margin-bottom: 1.4rem; }
        .step-card { background: var(--surface); border-radius: var(--radius-sm); box-shadow: var(--shadow); padding: 1rem 0.7rem; text-align: center; border-top: 3px dashed var(--border); }
        .step-card .step-num {
            width: 26px; height: 26px; border-radius: 50%; background: var(--ink); color: var(--plate-yellow);
            font-family: var(--font-display); font-weight: 700; font-size: 0.85rem;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 0.5rem;
        }
        .step-card .step-label { font-family: var(--font-display); text-transform: uppercase; letter-spacing: 0.03em; font-size: 0.78rem; color: var(--text-secondary); }
        @media (max-width: 480px) {
            .steps { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-icon">MOT<br/>PASS</div>
        <h1>MOT<span>Manager</span></h1>
        <p>Check your MOT status &amp; request a booking</p>
    </div>

    <div class="hazard-bar"></div>

    <div class="wrap">
        <div class="steps">
            <div class="step-card">
                <div class="step-num">1</div>
                <div class="step-label">Enter Reg</div>
            </div>
            <div class="step-card">
                <div class="step-num">2</div>
                <div class="step-label">See Status</div>
            </div>
            <div class="step-card">
                <div class="step-num">3</div>
                <div class="step-label">Book Test</div>
            </div>
        </div>

        <div class="card">
            <h2>Enter Your Registration</h2>
            <div class="search-row">
                <input type="text" id="regInput" placeholder="e.g. AB12 CDE" maxlength="10" />
            </div>
            <button class="btn-primary" id="searchBtn" style="margin-top:0.8rem;"><span class="btn-label">Check Status</span></button>
            <div class="error-msg hidden" id="searchError"></div>
        </div>

        <div class="card hidden" id="resultCard">
            <span class="plate" id="resultPlate"></span>
            <div id="resultStamp"></div>
            <div class="result-meta" id="resultMeta"></div>
        </div>

        <div class="card hidden" id="bookingCard">
            <h2>Request an MOT Booking</h2>
            <form id="bookingForm">
                <div class="form-group">
                    <label for="bookingDate">Preferred Date</label>
                    <input type="date" id="bookingDate" required />
                </div>
                <div class="form-group">
                    <label for="bookingTime">Preferred Time</label>
                    <input type="time" id="bookingTime" value="09:00" />
                </div>
                <div class="form-group">
                    <label for="bookingNotes">Notes (optional)</label>
                    <textarea id="bookingNotes" placeholder="Anything we should know..."></textarea>
                </div>
                <button type="submit" class="btn-primary" id="bookingSubmitBtn"><span class="btn-label">Request Booking</span></button>
            </form>
            <div class="success-box hidden" id="bookingSuccess">
                <div class="big-tick">✓</div>
                <p>Your booking request has been sent. We'll be in touch to confirm.</p>
            </div>
            <div class="error-msg hidden" id="bookingError"></div>
        </div>

        <p class="footer-note">Staff area? <a href="/admin" style="color:var(--steel-blue);">Sign in here</a></p>
    </div>

    <script>
        (function () {
            'use strict';
            const API_BASE = '/api/public';
            let currentReg = null;

            function setButtonLoading(btn, isLoading) {
                btn.disabled = isLoading;
                btn.classList.toggle('btn-loading', isLoading);
            }

            function formatDate(dateStr) {
                if (!dateStr) return '—';
                const d = new Date(dateStr + 'T00:00:00');
                return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
            }

            function getStatus(days) {
                if (days === null || days === undefined) return { cls: 'valid', label: 'No Date On File' };
                if (days < 0) return { cls: 'overdue', label: 'Overdue' };
                if (days <= 30) return { cls: 'due-soon', label: 'Due Soon' };
                return { cls: 'valid', label: 'Valid' };
            }

            async function searchVehicle() {
                const reg = document.getElementById('regInput').value.trim();
                const errorEl = document.getElementById('searchError');
                const resultCard = document.getElementById('resultCard');
                const bookingCard = document.getElementById('bookingCard');
                errorEl.classList.add('hidden');
                resultCard.classList.add('hidden');
                bookingCard.classList.add('hidden');

                if (!reg) {
                    errorEl.textContent = 'Please enter a registration number.';
                    errorEl.classList.remove('hidden');
                    return;
                }

                const btn = document.getElementById('searchBtn');
                setButtonLoading(btn, true);
                try {
                    const res = await fetch(`${API_BASE}/vehicle/${encodeURIComponent(reg)}`);
                    if (!res.ok) {
                        const err = await res.json().catch(() => ({}));
                        throw new Error(err.error || 'Vehicle not found');
                    }
                    const vehicle = await res.json();
                    currentReg = vehicle.regNumber;

                    document.getElementById('resultPlate').textContent = vehicle.regNumber;
                    const status = getStatus(vehicle.daysUntil);
                    const stampEl = document.getElementById('resultStamp');
                    stampEl.innerHTML = `<span class="stamp ${status.cls}">${status.label}</span>`;

                    const daysText = vehicle.daysUntil === null ? ''
                        : vehicle.daysUntil < 0 ? ` (${Math.abs(vehicle.daysUntil)} day${Math.abs(vehicle.daysUntil) === 1 ? '' : 's'} overdue)`
                        : ` (${vehicle.daysUntil} day${vehicle.daysUntil === 1 ? '' : 's'} left)`;
                    document.getElementById('resultMeta').innerHTML =
                        `${vehicle.make || ''} ${vehicle.model || ''}<br/>MOT expiry: <strong>${formatDate(vehicle.motExpiry)}</strong>${daysText}`;

                    resultCard.classList.remove('hidden');
                    bookingCard.classList.remove('hidden');
                    document.getElementById('bookingSuccess').classList.add('hidden');
                    document.getElementById('bookingForm').classList.remove('hidden');
                } catch (err) {
                    errorEl.textContent = err.message || 'Something went wrong. Please try again.';
                    errorEl.classList.remove('hidden');
                } finally {
                    setButtonLoading(btn, false);
                }
            }

            document.getElementById('searchBtn').addEventListener('click', searchVehicle);
            document.getElementById('regInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') searchVehicle();
            });

            // If arriving from a reminder email link (?reg=AB12CDE), prefill and auto-search
            const urlParams = new URLSearchParams(window.location.search);
            const regFromLink = urlParams.get('reg');
            if (regFromLink) {
                document.getElementById('regInput').value = regFromLink;
                searchVehicle();
            }

            document.getElementById('bookingDate').min = new Date().toISOString().split('T')[0];

            document.getElementById('bookingForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!currentReg) return;
                const errorEl = document.getElementById('bookingError');
                errorEl.classList.add('hidden');
                const btn = document.getElementById('bookingSubmitBtn');
                setButtonLoading(btn, true);
                try {
                    const res = await fetch(`${API_BASE}/bookings`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            regNumber: currentReg,
                            date: document.getElementById('bookingDate').value,
                            time: document.getElementById('bookingTime').value,
                            notes: document.getElementById('bookingNotes').value
                        })
                    });
                    if (!res.ok) {
                        const err = await res.json().catch(() => ({}));
                        throw new Error(err.error || 'Could not submit booking request');
                    }
                    document.getElementById('bookingForm').classList.add('hidden');
                    document.getElementById('bookingSuccess').classList.remove('hidden');
                } catch (err) {
                    errorEl.textContent = err.message || 'Something went wrong. Please try again.';
                    errorEl.classList.remove('hidden');
                } finally {
                    setButtonLoading(btn, false);
                }
            });
        })();
    </script>
</body>
</html>
